syntax = "proto3";

package workspace.local;

option csharp_namespace = "Pro.SerializationInterop.RVProtoData.Service.Workspace.Local";
option swift_prefix = "RVData_Service_Workspace_Local_";

import "document.entities.proto";

message Metadata {
  string pro_version = 2;
  string name = 3;
  string path = 4;
  optional string uuid = 1;
}

message Workspace {
  .workspace.local.Metadata metadata = 1;
  .document.DocumentSet documents = 2;
}

