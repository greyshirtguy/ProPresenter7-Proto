syntax = "proto3";

package helper.common.v2;

option csharp_namespace = "Pro.SerializationInterop.RVProtoData.MediaManagement.v2";
option swift_prefix = "RVData_MediaManagement_v2_";

import "effects.proto";
import "alphaType.proto";

message ProductInformation {
  string product_name = 1;
  string major_version = 2;
  string minor_version = 3;
  string patch_version = 4;
  string build_number = 5;
  int64 build_date = 6;
}

message FeatureFlags {
  repeated string flags = 1;
}

message ProContentToken {
  string access = 1;
  string refresh = 2;
}

message Version {
  int32 major = 1;
  int32 minor = 2;
  int32 patch = 3;
}

message Preferences {
  bool manage_media = 1;
  bool share_analytics = 2;
}

message CreationOption {
  string show_directory = 1;
  .helper.common.v2.Preferences preferences = 4;
  oneof Socket {
    string name = 2;
  }
  oneof timeout {
    uint32 seconds = 3;
  }
  optional string workspace_id = 5;
  optional uint64 peer_id = 6;
}

message MediaReferenceInfo {
  message Availability {
    message Ready {
    }

    message Missing {
    }

    message Downloading {
    }

    oneof availability {
      .helper.common.v2.MediaReferenceInfo.Availability.Ready ready = 1;
      .helper.common.v2.MediaReferenceInfo.Availability.Missing missing = 2;
      .helper.common.v2.MediaReferenceInfo.Availability.Downloading downloading = 3;
    }
  }

  message MediaInfo {
    enum ContentType {
      CONTENT_TYPE_UNKNOWN = 0;
      CONTENT_TYPE_AUDIO = 1;
      CONTENT_TYPE_IMAGE = 2;
      CONTENT_TYPE_VIDEO = 3;
    }

    enum ColorFormat {
      SDR = 0;
      HDR_REC2100_HLG = 1;
      HDR_REC2100_PQ = 2;
    }

    string url = 1;
    uint32 width = 2;
    uint32 height = 3;
    float fps = 4;
    float duration = 5;
    uint32 num_audio_channels = 6;
    string codec = 7;
    string artist = 8;
    string title = 9;
    int32 rotation = 10;
    .helper.common.v2.MediaReferenceInfo.MediaInfo.ContentType content_type = 11;
    bool has_alpha_channel = 12;
    bool supports_hw_decode = 13;
    .helper.common.v2.MediaReferenceInfo.MediaInfo.ColorFormat color_format = 14;
    .helper.common.v2.MediaReferenceInfo.Availability availability = 15;
  }

  message ThumbnailInfo {
    string url = 1;
    .helper.common.v2.MediaReferenceInfo.Availability availability = 2;
  }

  .helper.common.v2.MediaReferenceInfo.MediaInfo media_info = 1;
  .helper.common.v2.MediaReferenceInfo.ThumbnailInfo thumbnail_info = 2;
}

message RequestError {
  enum ErrorCode {
    UNKNOWN = 0;
    CANT_CREATE_MEDIA_FOLDER = 201;
    CANT_CREATE_META_FOLDER = 202;
    CANT_CREATE_THUMBNAILS_FOLDER = 203;
    CANT_DELETE_ACTIVE_WORKSPACE = 204;
    SERVICE_INTERNAL_ERROR = 300;
    SERVICE_HANDSHAKE_ERROR = 301;
    SERVICE_VERSION_MISMATCH = 302;
    SERVICE_CANT_SEND_REQUEST = 303;
    SERVICE_MISSING_RESPONSE = 304;
    BAD_REQUEST = 400;
    INVALID_UUID = 401;
    INVALID_REQUEST = 402;
    NOT_FOUND = 404;
    CONFLICT = 409;
    INTERNAL_ERROR = 500;
    NOT_IMPLEMENTED = 501;
    GENERATOR_ERROR = 502;
  }

  .helper.common.v2.RequestError.ErrorCode code = 1;
  string description = 2;
}

message ReferenceIdentifier {
  string uuid = 1;
  string container_id = 2;
}

message MediaReference {
  message Progress {
  }

  message Deleted {
  }

  message ProContentDownloading {
  }

  message Error {
    enum ErrorCode {
      INTERNAL_ERROR = 0;
      SNAPSHOT_FAILED_ERROR = 1;
    }

    .helper.common.v2.MediaReference.Error.ErrorCode code = 1;
    string description = 2;
  }

  .helper.common.v2.ReferenceIdentifier id = 1;
  oneof state {
    .helper.common.v2.MediaReferenceInfo success = 2;
    .helper.common.v2.MediaReference.Error error = 3;
    .helper.common.v2.MediaReference.Progress progress = 4;
    .helper.common.v2.MediaReference.Deleted deleted = 5;
    .helper.common.v2.MediaReference.ProContentDownloading downloading = 6;
  }
}

message AssetImported {
  message Success {
    string url = 1;
  }

  enum Error {
    IMPORT_RESULT_UNKNOWN_ERROR = 0;
    IMPORT_RESULT_INVALID_IMPORT_PATH = 1;
    IMPORT_RESULT_READ_PERMISSION_DENIED = 2;
    IMPORT_RESULT_WRITE_PERMISSION_DENIED = 3;
    IMPORT_RESULT_FULL_STORAGE = 4;
    IMPORT_RESULT_READ_ONLY_FILESYSTEM = 5;
  }

  .helper.common.v2.ReferenceIdentifier id = 1;
  oneof state {
    .helper.common.v2.AssetImported.Success success = 2;
    .helper.common.v2.AssetImported.Error error = 3;
  }
}

message ChangeShowDirectory {
  string path = 1;
  optional string workspace_id = 2;
}

message Workspace {
  string path = 1;
  optional string id = 2;
}

message UpdateWorkspaces {
  repeated .helper.common.v2.Workspace workspaces = 1;
}

message PauseSync {
  uint64 until_time_utc = 1;
}

message ResumeSync {
}

message AddMediaReference {
  .helper.common.v2.ReferenceIdentifier id = 1;
  string url = 2;
  .helper.common.v2.Priority priority = 3;
  .helper.common.v2.Transformation transformation = 4;
  optional bool manage_media = 5;
  optional bool user_initiated = 6;
}

message ProContentDownloadDetails {
  enum AssetType {
    ASSET_TYPE_UNSPECIFIED = 0;
    ASSET_TYPE_LOOP = 1;
    ASSET_TYPE_COUNTDOWN = 2;
    ASSET_TYPE_IMAGE = 3;
    ASSET_TYPE_MOTION_TITLE = 4;
    ASSET_TYPE_PACK = 5;
    ASSET_TYPE_THEME = 6;
  }

  string asset_identifier = 1;
  string display_name = 2;
  string relative_path = 3;
  string download_url = 4;
  string thumbnail_url = 5;
  .helper.common.v2.ProContentDownloadDetails.AssetType asset_type = 6;
}

message AddProContentReference {
  .helper.common.v2.ReferenceIdentifier id = 1;
  .helper.common.v2.ProContentDownloadDetails download_details = 2;
  .helper.common.v2.Transformation transformation = 3;
  .helper.common.v2.Priority priority = 4;
  optional bool user_initiated = 5;
}

message DuplicateMediaReference {
  .helper.common.v2.ReferenceIdentifier src_id = 1;
  .helper.common.v2.ReferenceIdentifier dest_id = 2;
  .helper.common.v2.Priority priority = 3;
  optional bool user_initiated = 4;
}

message Transformation {
  repeated .rv.data.Effect effects = 1;
  float position = 2;
  int32 rotation = 3;
  uint32 width = 4;
  uint32 height = 5;
  float insets_top = 6;
  float insets_left = 7;
  float insets_right = 8;
  float insets_bottom = 9;
  bool flip_horizontally = 10;
  bool flip_vertically = 11;
  .rv.data.AlphaType alpha_type = 12;
  bool use_default_native_rotation = 13;
}

message ApplyTransformation {
  .helper.common.v2.ReferenceIdentifier id = 1;
  .helper.common.v2.Transformation transformation = 2;
  .helper.common.v2.Priority priority = 3;
  optional bool user_initiated = 4;
}

message RemoveMediaReferences {
  repeated .helper.common.v2.ReferenceIdentifier id = 1;
  bool purge_asset = 2;
  bool delete_asset = 3;
  optional bool user_initiated = 4;
}

message TriggerMediaReference {
  repeated .helper.common.v2.ReferenceIdentifier id = 1;
}

message SmartPlaylist {
  string path = 1;
}

message UpdateSmartPlaylists {
  repeated .helper.common.v2.SmartPlaylist playlists = 1;
}

message UpdatePrefs {
  .helper.common.v2.Preferences preferences = 1;
}

message MarkWorkspaceAsCloud {
  string uuid = 1;
}

message MarkWorkspaceAsLocal {
}

message RemoveContainer {
  repeated string container_id = 1;
  optional bool user_initiated = 2;
}

message ImportUnmanagedMedia {
}

message Ping {
  int32 id = 1;
}

message AddMediaReferenceResponse {
}

message DuplicateMediaReferenceResponse {
}

message ApplyTransformationResponse {
}

message RemoveMediaReferenceResponse {
}

message TriggerMediaReferenceResponse {
}

message UpdateWorkspacesResponse {
}

message PauseSyncResponse {
}

message ResumeSyncResponse {
}

message UpdateSmartPlaylistsResponse {
}

message UpdatePrefsResponse {
}

message MarkWorkspaceAsCloudResponse {
}

message MarkWorkspaceAsLocalResponse {
}

message AddProContentReferenceResponse {
}

message RemoveContainerResponse {
}

message ImportUnmanagedMediaResponse {
}

message Pong {
  int32 id = 1;
}

enum Priority {
  Background = 0;
  UserInitiated = 1;
}

